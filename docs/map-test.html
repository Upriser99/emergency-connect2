<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map Test - Emergency Connect</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
        }

        h1 {
            color: #DC2626;
        }

        #map {
            width: 100%;
            height: 500px;
            border: 2px solid #ccc;
            border-radius: 8px;
        }

        .info {
            margin: 20px 0;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 8px;
        }

        .success {
            background: #d4edda;
            color: #155724;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>

<body>
    <h1>🗺️ Map Test Page</h1>
    <div id="status" class="info">Initializing map...</div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script>
        const statusDiv = document.getElementById('status');

        try {
            statusDiv.textContent = 'Creating map...';

            // Initialize map centered on Indore
            const map = L.map('map').setView([22.7196, 75.8577], 13);

            statusDiv.textContent = 'Loading map tiles...';

            // Add OpenStreetMap tiles
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors',
                maxZoom: 19
            }).addTo(map);

            // Add a marker
            const marker = L.marker([22.7196, 75.8577]).addTo(map);
            marker.bindPopup('<b>Indore City Center</b><br>Map is working!').openPopup();

            statusDiv.className = 'info success';
            statusDiv.innerHTML = '<strong>✅ Success!</strong> Map loaded correctly. Leaflet.js is working!';

            console.log('Map initialized successfully');

        } catch (error) {
            statusDiv.className = 'info error';
            statusDiv.innerHTML = '<strong>❌ Error:</strong> ' + error.message;
            console.error('Map error:', error);
        }
    </script>
</body>

</html>
